        window.loadSuggestions = async function () {
            suggestionsContainer.innerHTML = '<p class="font-mono text-sm text-gray-500">Loading suggestions...</p>';
            try {
                const q = query(collection(db, "suggestions"), where("status", "==", "pending"));
                const snapshot = await getDocs(q);

                suggestionsContainer.innerHTML = '';

                if (snapshot.empty) {
                    suggestionsContainer.innerHTML = `<div class="p-6 bg-white neo-border text-center font-mono">No pending suggestions. You're all caught up!</div>`;
                    return;
                }

                let suggestionsData = [];
                snapshot.forEach(doc => {
                    suggestionsData.push({ id: doc.id, ...doc.data() });
                });

                // Sort by request count (if duplicates happen)
                suggestionsData.sort((a, b) => (b.requestCount || 1) - (a.requestCount || 1));

                suggestionsData.forEach(data => {
                    const dateStr = data.createdAt ? data.createdAt.toDate().toLocaleDateString('en-GB') : 'Recently';

                    let badgeHtml = `<span class="bg-purple-100 text-purple-800 text-[10px] font-bold px-2 py-1 uppercase border border-purple-300">New Area Request</span>`;

                    // Display the new 5-tier context clearly
                    let contextHtml = `
                        <strong>State:</strong> ${data.stateId || 'Unknown'} <br/>
                        <strong>LGA:</strong> ${data.suggestedLGA || 'N/A'} <br/>
                        <strong>Hub:</strong> ${data.suggestedHubName || 'N/A'} <br/> 
                        <strong>Neighborhood:</strong> ${data.name || 'N/A'} <br/>
                        <strong>Contact:</strong> ${data.email || 'None provided'}
                    `;

                    const safeHubName = data.suggestedHubName ? data.suggestedHubName.replace(/'/g, "\\'") : '';
                    const safeName = data.name ? data.name.replace(/'/g, "\\'") : '';
                    const safeState = data.stateId || 'ng-lagos';

                    suggestionsContainer.innerHTML += `
                <div class="bg-white neo-border p-5 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                    <div class="space-y-2">
                        <div class="flex items-center gap-2 flex-wrap">
                            ${badgeHtml}
                        </div>
                        <p class="font-data-mono text-sm leading-relaxed">${contextHtml}</p>
                        <p class="font-mono text-[10px] text-gray-400">Suggested on: ${dateStr}</p>
                    </div>
                    <div class="flex gap-2 w-full md:w-auto">
                        <button onclick="window.rejectSuggestion('${data.id}')" class="flex-1 md:flex-none px-4 py-3 border-2 border-black bg-red-100 hover:bg-red-200 text-black font-bold uppercase text-[10px] transition-colors">Reject</button>
                        <button onclick="window.approveSuggestion('${data.id}', '${safeState}', '${safeName}', '${safeHubName}')" class="flex-1 md:flex-none px-4 py-3 border-2 border-black bg-black hover:bg-zinc-800 text-white font-bold uppercase text-[10px] transition-colors">Approve & Map</button>
                    </div>
                </div>
            `;
                });

            } catch (error) {
                console.error("Error fetching suggestions:", error);
                suggestionsContainer.innerHTML = `<div class="p-6 bg-red-100 text-red-700 neo-border font-mono">Error loading data. Make sure you are logged in as admin.</div>`;
            }
        }

        window.approveSuggestion = async function (docId, stateId, neighborhoodName, suggestedHubName) {
            try {
                // 1. Setup Hub/Region
                const newHubId = prompt(`Hub: "${suggestedHubName}"\n\nEnter ID for this Hub (e.g., surulere-01) or paste existing Hub ID to link them:`);
                if (!newHubId) return;

                // 2. Setup Neighborhood/Subregion
                const subIdInput = prompt(`Neighborhood: "${neighborhoodName}"\n\nEnter short ID for this neighborhood (e.g. akoka-01):`);
                if (!subIdInput) return;

                const newSubId = "sub-" + subIdInput.toLowerCase();

                // 3. Create/Merge Tier 1 Region
                await setDoc(doc(db, "regions", newHubId.toLowerCase()), {
                    name: suggestedHubName,
                    stateId: stateId
                }, { merge: true }); // Merge ensures we don't overwrite if you pasted an existing Hub ID

                // 4. Create Tier 2 Subregion
                await setDoc(doc(db, "subregions", newSubId), {
                    name: neighborhoodName,
                    regionId: newHubId.toLowerCase()
                });

                // 5. Update Status
                await updateDoc(doc(db, "suggestions", docId), { status: "approved" });

                alert("Successfully mapped!");
                window.loadSuggestions();
            } catch (error) {
                console.error(error);
                alert("Error mapping suggestion. Check console.");
            }
        }

        window.rejectSuggestion = async function (docId) {
            const confirmReject = confirm("Are you sure you want to reject and discard this suggestion?");
            if (!confirmReject) return;

            try {
                // Update status to rejected
                await updateDoc(doc(db, "suggestions", docId), {
                    status: "rejected",
                    rejectedAt: new Date()
                });
                window.loadSuggestions(); // Refresh list
            } catch (error) {
                console.error(error);
                alert("Error rejecting suggestion.");
            }
        }

        window.runMigration = async function () {
            if (!confirm("Are you sure you want to migrate the database? This cannot be undone.")) return;

            try {
                console.log("Starting Migration...");
                const batch = writeBatch(db);

                // 1. THE MAPPING DICTIONARY
                const migrationMap = {
                    "egb-01": { action: "make_subregion", parentId: "alim-01", name: "Egbeda" },
                    "ikt-01": { action: "make_subregion", parentId: "alim-01", name: "Ikotun, Abaranje" },
                    "iyp-01": { action: "make_subregion", parentId: "alim-01", name: "Iyana Paja" },
                    "ogba-01": { action: "make_subregion", parentId: "ikj-01", name: "Ogba" },
                    "md-01": { action: "make_subregion", parentId: "ikj-01", name: "Maryland / Mende" },
                    "akok-01": { action: "make_subregion", parentId: "yb-01", name: "Akoka" },
                    "ida-01": { action: "make_subregion", parentId: "mus-01", name: "Idi Araba" },
                    "ajo-01": { action: "make_subregion", parentId: "oshd-01", name: "Ajao Estate" },
                    "sgtd-01": { action: "make_subregion", parentId: "aj-01", name: "Sangotedo" },
                    "gb-01": { action: "make_subregion", parentId: "gbagada-01", name: "Gbagada Phase 1" },
                    "lk-01": { action: "make_subregion", parentId: "lekki-01", name: "Lekki Phase 1" },
                    "mg-01": { action: "make_subregion", parentId: "magodo-01", name: "Magodo Phase 2" }
                };

                // 2. MIGRATE REGIONS TO SUB-REGIONS
                const regionsSnap = await getDocs(collection(db, "regions"));

                regionsSnap.forEach(regionDoc => {
                    const oldId = regionDoc.id;
                    const mapData = migrationMap[oldId];

                    if (mapData && mapData.action === "make_subregion") {
                        // Prepend 'sub-' to the old ID
                        const newSubId = "sub-" + oldId;

                        // Create it in the new 'subregions' collection
                        const newSubRef = doc(db, "subregions", newSubId);
                        batch.set(newSubRef, {
                            regionId: mapData.parentId,
                            name: mapData.name,
                            migratedAt: new Date()
                        });

                        // Delete the old one from 'regions'
                        const oldRegRef = doc(db, "regions", oldId);
                        batch.delete(oldRegRef);
                        console.log(`Moved ${oldId} to subregions as ${newSubId}`);
                    }
                });

                // 3. RE-LINK THE LOGS
                const logsSnap = await getDocs(collection(db, "logs"));

                logsSnap.forEach(logDoc => {
                    const logData = logDoc.data();
                    const logRef = doc(db, "logs", logDoc.id);
                    const oldAreaId = logData.areaId;

                    const mapData = migrationMap[oldAreaId];

                    if (mapData && mapData.action === "make_subregion") {
                        // Re-link the log using the new 'sub-' prefixed ID
                        batch.update(logRef, {
                            subregionId: "sub-" + oldAreaId,
                            areaId: null
                        });
                        console.log(`Updated log ${logDoc.id} to use subregionId: sub-${oldAreaId}`);
                    }
                });

                // 4. COMMIT BATCH
                console.log("Committing changes to Firestore...");
                await batch.commit();
                alert("Migration Complete! Check your Firestore console.");

            } catch (error) {
                console.error("Migration Failed: ", error);
                alert("Error during migration. Check console.");
            }
        }

        window.seedNationalData = async function () {
            if (!confirm("This will upload 36 States and 774 LGAs to Firestore. Proceed?")) return;

            let naijaData;

            try {
                // Fetch the JSON file directly from your project folder
                const response = await fetch('./nigerian-states.json');
                if (!response.ok) throw new Error("Could not find nigerian-states.json");
                naijaData = await response.json();
            } catch (err) {
                alert("Failed to load JSON file. Make sure 'nigerian-states.json' is in the same folder as this HTML file, and you are running a local server.");
                console.error(err);
                return;
            }

            try {
                const { writeBatch, doc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js");

                console.log("Initializing National Seeding...");

                // Ensure the Country document exists
                await setDoc(doc(db, "countries", "ng"), {
                    name: "Nigeria",
                    code: "NG",
                    isActive: true
                });

                let currentBatch = writeBatch(db);
                let operationCount = 0;
                let batchCount = 1;

                // Loop through the fetched JSON data
                for (const [stateName, lgas] of Object.entries(naijaData)) {
                    // Format state ID (e.g., "ng-lagos")
                    const stateId = `ng-${stateName.toLowerCase().replace(/[^a-z0-9]/g, '')}`;

                    // Add State to batch
                    currentBatch.set(doc(db, "states", stateId), {
                        name: stateName,
                        countryId: "ng",
                        isActive: true
                    });
                    operationCount++;

                    // Process each LGA in the state
                    for (const lgaName of lgas) {
                        // Check batch limit (Firestore max is 500)
                        if (operationCount >= 450) {
                            await currentBatch.commit();
                            console.log(`Committed Batch ${batchCount}`);
                            currentBatch = writeBatch(db);
                            operationCount = 0;
                            batchCount++;
                        }

                        // Format LGA ID (e.g., "ng-lagos-alimosho")
                        const cleanLga = lgaName.toLowerCase().replace(/[^a-z0-9]/g, '');
                        const lgaId = `${stateId}-${cleanLga}`;

                        // Add LGA as a Region (Hub)
                        currentBatch.set(doc(db, "regions", lgaId), {
                            name: lgaName,
                            stateId: stateId,
                            countryId: "ng",
                            isOfficialLGA: true // Tag it so you know it came from the JSON
                        });
                        operationCount++;
                    }
                }

                // Commit any remaining operations
                if (operationCount > 0) {
                    await currentBatch.commit();
                    console.log(`Committed Final Batch ${batchCount}`);
                }

                alert("National Seeding Complete! All States and LGAs are now in Firestore.");

            } catch (error) {
                console.error("Seeding Failed: ", error);
                alert("Error during seeding. Check console.");
            }
        }

        window.nukeAndSeed5Tier = async function () {
            if (!confirm("This will delete the experimental LGAs from 'regions' and build the new 5-tier 'states' and 'lgas' collections. Proceed?")) return;

            try {
                const { collection, getDocs, query, where, writeBatch, doc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js");

                console.log("1. Cleaning up old experimental data...");
                const regionsRef = collection(db, "regions");
                const q = query(regionsRef, where("isOfficialLGA", "==", true));
                const snapshot = await getDocs(q);

                let batch = writeBatch(db);
                let count = 0;

                snapshot.forEach((docSnap) => {
                    batch.delete(docSnap.ref);
                    count++;
                });

                if (count > 0) {
                    await batch.commit();
                    console.log(`Deleted ${count} experimental LGA regions.`);
                }

                console.log("2. Fetching nigerian-states.json...");
                const response = await fetch('./nigerian-states.json');
                const naijaData = await response.json();

                console.log("3. Seeding new States and LGAs collections...");
                batch = writeBatch(db);
                let opCount = 0;

                // Create Country
                batch.set(doc(db, "countries", "ng"), { name: "Nigeria", code: "NG", isActive: true });
                opCount++;

                for (const [stateName, lgas] of Object.entries(naijaData)) {
                    const stateId = `ng-${stateName.toLowerCase().replace(/[^a-z0-9]/g, '')}`;

                    // Create State
                    batch.set(doc(db, "states", stateId), {
                        name: stateName,
                        countryId: "ng",
                        isActive: true
                    });
                    opCount++;

                    for (const lgaName of lgas) {
                        if (opCount >= 450) {
                            await batch.commit();
                            batch = writeBatch(db);
                            opCount = 0;
                        }

                        const cleanLga = lgaName.toLowerCase().replace(/[^a-z0-9]/g, '');
                        const lgaId = `${stateId}-${cleanLga}`;

                        // Create LGA in its OWN collection
                        batch.set(doc(db, "lgas", lgaId), {
                            name: lgaName,
                            stateId: stateId,
                            countryId: "ng"
                        });
                        opCount++;
                    }
                }

                if (opCount > 0) await batch.commit();
                alert("Cleanup & 5-Tier Seeding Complete!");

            } catch (error) {
                console.error("Operation Failed: ", error);
                alert("Error. Check console.");
            }
        }
        window.migrateOldRegions = async function () {
            if (!confirm("This will attach all old, manually created regions to 'ng-lagos' so they don't break the new UI. Proceed?")) return;

            try {
                const { collection, getDocs, writeBatch } = await import("https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js");

                console.log("Fetching existing regions...");
                const snap = await getDocs(collection(db, "regions"));
                let batch = writeBatch(db);
                let count = 0;

                snap.forEach(d => {
                    const data = d.data();
                    // Only update it if it's an old region missing the new stateId
                    if (!data.stateId && !data.isOfficialLGA) {
                        batch.update(d.ref, { stateId: "ng-lagos" });
                        count++;
                    }
                });

                if (count > 0) {
                    await batch.commit();
                    console.log(`Successfully updated ${count} old regions.`);
                    alert(`Success! ${count} old regions attached to Lagos.`);
                } else {
                    alert("No old regions found that needed updating.");
                }

            } catch (e) {
                console.error("Migration Error:", e);
                alert("Error during migration. Check console.");
            }
        }

                "mus-01": { stateId: "ng-lagos", lgaId: "ng-lagos-mushin" },
                "ogdu-01": { stateId: "ng-lagos", lgaId: "ng-lagos-kosofe" },
                "oshd-01": { stateId: "ng-lagos", lgaId: "ng-lagos-oshodiisolo" },
                "prsv-01": { stateId: "ng-lagos", lgaId: "ng-lagos-kosofe" }, // Praiseville Estate
                "sang-01": { stateId: "ng-ogun", lgaId: "ng-ogun-adoodoota" },
                "sr-01": { stateId: "ng-lagos", lgaId: "ng-lagos-surulere" },
                "vi-01": { stateId: "ng-lagos", lgaId: "ng-lagos-etiosa" },
                "yb-01": { stateId: "ng-lagos", lgaId: "ng-lagos-lagosmainland" }
            };

            try {
                const { doc, writeBatch } = await import("https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js");

                let batch = writeBatch(db);
                let count = 0;

                for (const [regionId, geographyData] of Object.entries(lgaMap)) {
                    const regionRef = doc(db, "regions", regionId);

                    // We update both the stateId AND the lgaId so it sits perfectly in the 5-tier system
                    batch.update(regionRef, {
                        stateId: geographyData.stateId,
                        lgaId: geographyData.lgaId
                    });
                    count++;
                }

                await batch.commit();
                alert(`Success! ${count} regions have been successfully mapped to their official LGAs.`);

            } catch (e) {
                console.error("Mapping Error:", e);
                alert("Error during mapping. Check your console.");
            }
        }
        window.exportSuggestions = async function () {
            try {
                const { collection, getDocs, query, where } = await import("https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js");

                console.log("Fetching all pending suggestions...");
                const q = query(collection(db, "suggestions"), where("status", "==", "pending"));
                const snap = await getDocs(q);

                let suggestionsList = [];

                snap.forEach(d => {
                    // Strip out the Firestore Timestamp object for clean JSON export
                    const data = d.data();
                    delete data.createdAt;

                    suggestionsList.push({ id: d.id, ...data });
                });

                console.log("=== COPY THE SUGGESTIONS DATA BELOW ===");
                console.log(JSON.stringify(suggestionsList, null, 2));
                console.log("=======================================");

                alert(`Found ${suggestionsList.length} pending suggestions. Press F12 and copy the JSON from the Console.`);

            } catch (e) {
                console.error("Export Error:", e);
                alert("Error exporting suggestions. Check console.");
            }
        }
        window.normalizeSuggestions = async function () {
            if (!confirm("This will upgrade all old suggestions to the new 5-tier schema. Proceed?")) return;

            try {
                const { collection, getDocs, writeBatch, deleteField } = await import("https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js");

                console.log("Fetching suggestions to normalize...");
                const snap = await getDocs(collection(db, "suggestions"));
                let batch = writeBatch(db);
                let count = 0;

                // Map of your old Hub IDs to their actual names
                const oldHubNames = {
                    "aj-01": "Ajah",
                    "ikrd-01": "Ikorodu",
                    "mus-01": "Mushin",
                    "agg-01": "Agege"
                };

                snap.forEach(d => {
                    const data = d.data();

                    // Skip records that are already properly formatted (has stateId)
                    if (data.stateId && data.stateId !== "") return;

                    let updates = {};

                    // 1. Determine State
                    updates.stateId = "ng-lagos"; // Default

                    const rawName = (data.name || "").toLowerCase();
                    const rawHub = (data.suggestedHubName || "").toLowerCase();

                    if (rawName.includes("ogun") || rawHub.includes("ogun") || rawHub === "oke-aro" || rawName === "ilisan" || rawName === "onajobi estate") {
                        updates.stateId = "ng-ogun";
                    } else if (rawName.includes("achara-layout")) {
                        updates.stateId = "ng-enugu";
                    } else if (rawName.includes("rigiya doruwa")) {
                        updates.stateId = "ng-zamfara";
                    }

                    // 2. Determine Hub Name
                    if (data.parentId && oldHubNames[data.parentId]) {
                        // If it used an old ID dropdown
                        updates.suggestedHubName = oldHubNames[data.parentId];
                    } else if (data.suggestedHubName && data.suggestedHubName.toLowerCase() !== "ogun" && data.suggestedHubName !== "") {
                        // If they typed a hub name that isn't just the name of a state
                        updates.suggestedHubName = data.suggestedHubName;
                    } else {
                        // Orphan records get marked as Unknown so the Admin can manually route them
                        updates.suggestedHubName = "Unknown Hub (Manual Map Needed)";
                    }

                    // 3. Ensure baseline 5-tier fields exist
                    updates.suggestedLGA = data.suggestedLGA || "Unknown";
                    updates.email = data.email || null;

                    // 4. Clean up old schema garbage
                    updates.parentId = deleteField();

                    batch.update(d.ref, updates);
                    count++;
                });

                if (count > 0) {
                    await batch.commit();
                    alert(`Successfully normalized ${count} broken suggestions! You can now load the admin panel safely.`);
                    window.loadSuggestions(); // Refresh the UI
                } else {
                    alert("All suggestions are already in the correct format.");
                }

            } catch (e) {
                console.error("Normalization Error:", e);
                alert("Error normalizing. Check console.");
            }
        }
    </script>
